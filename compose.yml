version: "3.9"

services:
  devopsdb:
    image: shahedaa/automation:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 3
    networks:
      - mynetwork

  application:
    image: shahedaa/automation:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 3
    networks:
      - mynetwork
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: overlay
